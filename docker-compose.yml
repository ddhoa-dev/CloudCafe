version: '3.8'

services:
  # ===== PostgreSQL Database =====
  postgres:
    image: postgres:16-alpine
    container_name: cafe-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: CafeManagementDb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - cafe-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== pgAdmin =====
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cafe-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cafe.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - cafe-network
    depends_on:
      - postgres

  # ===== API Service =====
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cafe-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=CafeManagementDb;Username=postgres;Password=postgres"
      JwtSettings__Secret: "docker-secret-key-must-be-at-least-32-characters-long-for-security"
      JwtSettings__Issuer: "CafeManagementAPI"
      JwtSettings__Audience: "CafeManagementClient"
      JwtSettings__ExpiryMinutes: "60"
    ports:
      - "5000:5000"
    networks:
      - cafe-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:

networks:
  cafe-network:
    driver: bridge
