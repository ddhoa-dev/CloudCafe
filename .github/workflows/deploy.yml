name: Deploy to Production

on:
  release:
    types: [published]
  workflow_dispatch: # Cho phép trigger manual

env:
  DOTNET_VERSION: "8.0.x"

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --configuration Release --no-restore

      - name: Publish application
        run: dotnet publish src/CafeManagement.API/CafeManagement.API.csproj -c Release -o ./publish

      - name: Deploy to server via SSH
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "./publish/*"
          target: "/var/www/cafemanagement"

      - name: Restart application
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/cafemanagement
            sudo systemctl restart cafemanagement.service
            sudo systemctl status cafemanagement.service

      - name: Health check
        run: |
          sleep 10
          curl -f ${{ secrets.APP_URL }}/health || exit 1
